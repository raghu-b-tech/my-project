name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Type check (mypy)
        # Advisory for now: surfaces findings in the log without failing
        # the build. Flip this off once a local `mypy app` run comes back
        # clean and you're ready to make it a hard gate.
        continue-on-error: true
        run: mypy app

      - name: Test (pytest)
        env:
          GEMINI_API_KEY: ci-placeholder-key-not-real
        run: pytest -v

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run OSV-Scanner
        uses: google/osv-scanner-action/osv-scanner-action@v2
        with:
          scan-args: |-
            --recursive
            ./
        continue-on-error: true

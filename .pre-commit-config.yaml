# Optional but recommended: `pip install pre-commit && pre-commit install`
# to run these checks locally before every commit, instead of finding out
# about them only after CI runs. Mirrors Google's own guidance for
# agent-assisted coding workflows: catch issues at commit time, not after.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=500"]  # keeps any single accidental asset from blowing the 10MB repo cap
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: detect-private-key
